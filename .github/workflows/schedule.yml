name: Team Pulse Bot

on:
  schedule:
    - cron: '55 7 * * 1'
    - cron: '55 7 * * 2-5'
    - cron: '0 13 * * 5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'standup'
        type: choice
        options:
          - monday
          - standup
          - friday

jobs:
  monday:
    if: github.event.schedule == '55 7 * * 1' || github.event.inputs.job == 'monday'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install slack-sdk python-dotenv
      - run: python monday.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  standup:
    if: github.event.schedule == '55 7 * * 2-5' || github.event.inputs.job == 'standup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install slack-sdk python-dotenv
      - run: python standup.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  friday:
    if: github.event.schedule == '0 13 * * 5' || github.event.inputs.job == 'friday'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install slack-sdk python-dotenv
      - run: python friday.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
